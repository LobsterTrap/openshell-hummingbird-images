# SPDX-License-Identifier: Apache-2.0

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the release ref and commit SHA
  # ---------------------------------------------------------------------------
  resolve-release:
    name: Resolve Release Ref
    runs-on: ubuntu-latest
    outputs:
      source-ref: ${{ steps.resolve.outputs.source_ref }}
      source-sha: ${{ steps.resolve.outputs.source_sha }}
      semver: ${{ steps.resolve.outputs.semver }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag to ref and SHA
        id: resolve
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ env.RELEASE_TAG }}"
            git fetch --force --tags origin
            SHA="$(git rev-list -n 1 "refs/tags/${TAG}")"
            REF="refs/tags/${TAG}"
          else
            TAG="${{ env.RELEASE_TAG }}"
            SHA="${{ github.sha }}"
            REF="${{ github.ref }}"
          fi

          if [ -z "$SHA" ]; then
            echo "Could not resolve release tag ${TAG}" >&2
            exit 1
          fi

          echo "source_ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Build all core images
  # ---------------------------------------------------------------------------
  build-core:
    name: Build Core Images
    needs: resolve-release
    uses: ./.github/workflows/build-core.yml
    with:
      publish: true
      source-ref: ${{ needs.resolve-release.outputs.source-ref }}
      image-sha: ${{ needs.resolve-release.outputs.source-sha }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Build all sandbox images
  # ---------------------------------------------------------------------------
  build-sandboxes:
    name: Build Sandbox Images
    needs: resolve-release
    uses: ./.github/workflows/build-sandboxes.yml
    with:
      publish: true
      source-ref: ${{ needs.resolve-release.outputs.source-ref }}
      image-sha: ${{ needs.resolve-release.outputs.source-sha }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Smoke test
  # ---------------------------------------------------------------------------
  verify:
    name: Verify Images
    needs: [resolve-release, build-core, build-sandboxes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.source-ref }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Lowercase image prefix
        id: repo
        run: echo "image_prefix=${IMAGE_PREFIX,,}" >> "$GITHUB_OUTPUT"

      - name: Run smoke test suite
        run: |
          set -euo pipefail
          REGISTRY="${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}"
          ./scripts/verify-images.sh "${REGISTRY}" "${{ needs.resolve-release.outputs.source-sha }}"

  # ---------------------------------------------------------------------------
  # Tag images with release version
  # ---------------------------------------------------------------------------
  tag-release:
    name: Tag Release Images
    needs: [resolve-release, build-core, build-sandboxes, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Lowercase image prefix
        id: repo
        run: echo "image_prefix=${IMAGE_PREFIX,,}" >> "$GITHUB_OUTPUT"

      - name: Tag all images with version and latest
        run: |
          set -euo pipefail
          REGISTRY="${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}"
          VERSION="${{ needs.resolve-release.outputs.semver }}"
          SHA="${{ needs.resolve-release.outputs.source-sha }}"

          IMAGES=(
            "gateway"
            "supervisor"
            "sandboxes/base"
            "sandboxes/openclaw"
            "sandboxes/openclaw-nvidia"
            "sandboxes/ollama"
            "sandboxes/gemini"
            "sandboxes/droid"
          )

          for image in "${IMAGES[@]}"; do
            echo "Tagging ${REGISTRY}/${image}:${SHA} -> ${VERSION}, latest"

            for TAG in "${VERSION}" "latest"; do
              podman manifest create "${REGISTRY}/${image}:${TAG}"
              podman manifest add "${REGISTRY}/${image}:${TAG}" "${REGISTRY}/${image}:${SHA}-amd64"
              podman manifest add "${REGISTRY}/${image}:${TAG}" "${REGISTRY}/${image}:${SHA}-arm64"
              podman manifest push "${REGISTRY}/${image}:${TAG}" "docker://${REGISTRY}/${image}:${TAG}"
            done
          done

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [resolve-release, tag-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.source-ref }}

      - name: Lowercase image prefix
        id: repo
        run: echo "image_prefix=${IMAGE_PREFIX,,}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenShell Hummingbird Images ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          body: |
            ## OpenShell Hummingbird Images ${{ env.RELEASE_TAG }}

            Container images for OpenShell rebased onto Project Hummingbird hardened base images.

            ### Images

            ```
            # Core infrastructure (distroless)
            podman pull ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/gateway:${{ needs.resolve-release.outputs.semver }}
            podman pull ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/supervisor:${{ needs.resolve-release.outputs.semver }}

            # Sandbox images (builder)
            podman pull ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/sandboxes/base:${{ needs.resolve-release.outputs.semver }}
            podman pull ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/sandboxes/openclaw:${{ needs.resolve-release.outputs.semver }}
            podman pull ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/sandboxes/openclaw-nvidia:${{ needs.resolve-release.outputs.semver }}
            podman pull ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/sandboxes/ollama:${{ needs.resolve-release.outputs.semver }}
            podman pull ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/sandboxes/gemini:${{ needs.resolve-release.outputs.semver }}
            podman pull ${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/sandboxes/droid:${{ needs.resolve-release.outputs.semver }}
            ```

            ### Base Images

            - Core: `quay.io/hummingbird/core-runtime` (distroless)
            - Sandboxes: `quay.io/hummingbird/nodejs:22-builder`
