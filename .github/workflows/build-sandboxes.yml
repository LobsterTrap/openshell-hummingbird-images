# SPDX-License-Identifier: Apache-2.0

name: Build Sandbox Images

on:
  push:
    branches: [main]
    paths:
      - "sandboxes/**"
  pull_request:
    branches: [main]
    paths:
      - "sandboxes/**"
  workflow_call: {}
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Detect which sandboxes changed
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect changed sandboxes
    runs-on: ubuntu-latest
    outputs:
      base-changed: ${{ steps.changes.outputs.base_changed }}
      sandboxes: ${{ steps.changes.outputs.sandboxes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed sandboxes
        id: changes
        run: |
          set -euo pipefail

          # Rebuild everything for: workflow_dispatch, workflow_call (from release.yml),
          # or tag pushes. When called via workflow_call on a tag push, github.event.before
          # is the zero SHA, so we detect that case too.
          BEFORE="${{ github.event.before }}"
          IS_TAG="${{ startsWith(github.ref, 'refs/tags/') }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "$IS_TAG" = "true" ] || \
             [ -z "$BEFORE" ] || \
             [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BASE_CHANGED="true"
            SANDBOXES=$(find sandboxes -mindepth 1 -maxdepth 1 -type d \
              -exec test -f {}/Containerfile \; -print \
              | xargs -I{} basename {} \
              | grep -v '^base$' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
            else
              BASE_SHA="${{ github.event.before }}"
            fi

            CHANGED=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" -- sandboxes/)

            if echo "$CHANGED" | grep -q '^sandboxes/base/'; then
              BASE_CHANGED="true"
              SANDBOXES=$(find sandboxes -mindepth 1 -maxdepth 1 -type d \
                -exec test -f {}/Containerfile \; -print \
                | xargs -I{} basename {} \
                | grep -v '^base$' \
                | jq -R -s -c 'split("\n") | map(select(length > 0))')
            else
              BASE_CHANGED="false"
              SANDBOXES=$(echo "$CHANGED" \
                | cut -d'/' -f2 \
                | sort -u \
                | while read -r name; do
                    if [ "$name" != "base" ] && [ -f "sandboxes/${name}/Containerfile" ]; then echo "$name"; fi
                  done \
                | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          fi

          echo "base_changed=${BASE_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "sandboxes=${SANDBOXES}" >> "$GITHUB_OUTPUT"
          echo "Base changed: ${BASE_CHANGED}"
          echo "Will build: ${SANDBOXES}"

  # ---------------------------------------------------------------------------
  # Build base sandbox image (multi-arch via podman manifest)
  # ---------------------------------------------------------------------------
  build-base:
    name: Build base
    needs: detect-changes
    if: needs.detect-changes.outputs.base-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image prefix
        id: repo
        run: echo "image_prefix=${IMAGE_PREFIX,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU for multi-arch
        run: sudo apt-get install -y qemu-user-static

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/sandboxes/base"
          echo "sha_tag=${IMAGE}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build multi-arch manifest
        run: |
          set -euo pipefail
          IMAGE="${{ steps.tags.outputs.image }}"
          SHA="${{ github.sha }}"

          # Build per-arch
          for ARCH in amd64 arm64; do
            podman build \
              --platform "linux/${ARCH}" \
              -f sandboxes/base/Containerfile \
              -t "${IMAGE}:${SHA}-${ARCH}" \
              sandboxes/base/
          done

      - name: Push images
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          IMAGE="${{ steps.tags.outputs.image }}"
          SHA="${{ github.sha }}"

          # Push per-arch images
          for ARCH in amd64 arm64; do
            podman push "${IMAGE}:${SHA}-${ARCH}"
          done

          # Create and push multi-arch manifests
          for TAG in "${SHA}" "latest"; do
            podman manifest create "${IMAGE}:${TAG}"
            podman manifest add "${IMAGE}:${TAG}" "${IMAGE}:${SHA}-amd64"
            podman manifest add "${IMAGE}:${TAG}" "${IMAGE}:${SHA}-arm64"
            podman manifest push "${IMAGE}:${TAG}" "docker://${IMAGE}:${TAG}"
          done

  # ---------------------------------------------------------------------------
  # Build derivative sandbox images (matrix)
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.sandbox }}
    needs: [detect-changes, build-base]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped') &&
      needs.detect-changes.outputs.sandboxes != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sandbox: ${{ fromJson(needs.detect-changes.outputs.sandboxes) }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image prefix
        id: repo
        run: echo "image_prefix=${IMAGE_PREFIX,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU for multi-arch
        run: sudo apt-get install -y qemu-user-static

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Start local registry (PR only)
        if: github.ref != 'refs/heads/main'
        run: podman run -d -p 5000:5000 --name registry registry:2

      - name: Build base image locally (PR only)
        if: github.ref != 'refs/heads/main'
        run: |
          podman build \
            -f sandboxes/base/Containerfile \
            -t localhost:5000/sandboxes/base:latest \
            sandboxes/base/
          podman push localhost:5000/sandboxes/base:latest --tls-verify=false

      - name: Determine parent sandbox
        id: parent
        run: |
          set -euo pipefail
          DEFAULT_BASE=$(grep '^ARG BASE_IMAGE=' "sandboxes/${{ matrix.sandbox }}/Containerfile" | head -1 | cut -d= -f2-)
          PARENT=$(echo "$DEFAULT_BASE" | sed -n 's|.*/sandboxes/\([^:]*\).*|\1|p')
          if [ -z "$PARENT" ]; then
            PARENT="base"
          fi
          echo "sandbox=$PARENT" >> "$GITHUB_OUTPUT"
          echo "Parent for ${{ matrix.sandbox }}: $PARENT"

      - name: Build parent sandbox locally (PR only)
        if: github.ref != 'refs/heads/main' && steps.parent.outputs.sandbox != 'base'
        run: |
          podman build \
            --build-arg BASE_IMAGE=localhost:5000/sandboxes/base:latest \
            -f sandboxes/${{ steps.parent.outputs.sandbox }}/Containerfile \
            -t localhost:5000/sandboxes/${{ steps.parent.outputs.sandbox }}:latest \
            sandboxes/${{ steps.parent.outputs.sandbox }}/
          podman push localhost:5000/sandboxes/${{ steps.parent.outputs.sandbox }}:latest --tls-verify=false

      - name: Set BASE_IMAGE
        id: base
        run: |
          PARENT="${{ steps.parent.outputs.sandbox }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "image=${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/sandboxes/${PARENT}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "image=localhost:5000/sandboxes/${PARENT}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/sandboxes/${{ matrix.sandbox }}"
          SHA="${{ github.sha }}"
          BASE="${{ steps.base.outputs.image }}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Multi-arch build for main
            for ARCH in amd64 arm64; do
              podman build \
                --platform "linux/${ARCH}" \
                --build-arg "BASE_IMAGE=${BASE}" \
                -f sandboxes/${{ matrix.sandbox }}/Containerfile \
                -t "${IMAGE}:${SHA}-${ARCH}" \
                sandboxes/${{ matrix.sandbox }}/
            done
          else
            # amd64-only for PRs
            podman build \
              --build-arg "BASE_IMAGE=${BASE}" \
              -f sandboxes/${{ matrix.sandbox }}/Containerfile \
              -t "${IMAGE}:${SHA}" \
              sandboxes/${{ matrix.sandbox }}/
          fi

      - name: Push images
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ steps.repo.outputs.image_prefix }}/sandboxes/${{ matrix.sandbox }}"
          SHA="${{ github.sha }}"

          # Push per-arch images
          for ARCH in amd64 arm64; do
            podman push "${IMAGE}:${SHA}-${ARCH}"
          done

          # Create and push multi-arch manifests
          for TAG in "${SHA}" "latest"; do
            podman manifest create "${IMAGE}:${TAG}"
            podman manifest add "${IMAGE}:${TAG}" "${IMAGE}:${SHA}-amd64"
            podman manifest add "${IMAGE}:${TAG}" "${IMAGE}:${SHA}-arm64"
            podman manifest push "${IMAGE}:${TAG}" "docker://${IMAGE}:${TAG}"
          done
